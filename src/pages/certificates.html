<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      crossorigin="anonymous"
    />

  </head>

  <body class="bg-black">
    <header>
      <nav
        class="container navbar navbar-expand-lg d-flex justify-content-between border rounded my-2 bg-black bg-gradient border-secondary"

          <p class="text-white fw-bolder m-0">Frontend Developer</p>
        </div>
        <div class="container-fluid">
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a
                  class="nav-link text-white"
                  aria-current="page"
                  href="/index.html#about-me"
                  >About me</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link text-white" href="/index.html#projects"
                  >Projects</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link text-white" href="/index.html#certifications"
                  >Certificates</a
                >
              </li>
            </ul>
          </div>
        </div>
        <div
          class="container-fluid d-flex justify-content-end align-items-center p-0"
        >
          <a
            class="navbar-brand text-white"
            target="_blank"
            href="https://github.com/jonathangalimberti/"
          >
            <img
              src="/public/img/gthub.png"
              alt="github"
              width="30"
              height="24"
              class="d-inline-block align-text-top img-fluid m-0 toggle-icon"
            />
          </a>
          <a
            class="navbar-brand text-white"
            target="_blank"
            href="https://www.linkedin.com/in/jonathan-galimberti-developer"
          >
            <img
              src="/public/img/linkdin.png"
              alt="linkdin"
              width="30"
              height="24"
              class="d-inline-block align-text-top img-fluid m-0"
            />
          </a>
          <a
            class="navbar-brand text-white border-start border-secondary"
            href="#"
            id="toggle-mode"
          >
            <img
              src="/public/img/moon.png"
              alt="Toggle-mode"
              width="30"
              height="24"
              class="d-inline-block align-text-top img-fluid ms-3 toggle-icon"
              id="toggle-icon"
            />
          </a>
        </div>
      </nav>
    </header>

    <body>
      <section
        id="main-section"
        class="container bg-black bg-gradient border-secondary rounded border"
      >
        <div class="container d-flex flex-column align-items-center my-3">
          <div id="search" class="mx-2">
            <input
              type="search"
              name=""
              value=""
              id="search-input"
              placeholder="Search certificate"
              onkeyup="searchCertificate(value)"
              class="border rounded px-3 py-1"
            />
          </div>
          <div
            id="filters"
            class="container d-flex align-items-center justify-content-center mt-2 text-white"
          >
            <input
              type="radio"
              checked
              value="All"
              name="filters"
              id=""
              class="px-2 mx-2"
              onclick="filter(value)"
            />All
            <input
              type="radio"
              value="Development"
              name="filters"
              id=""
              class="px-2 mx-2"
              onclick="filter(value)"
            />Development
            <input
              type="radio"
              value="English"
              name="filters"
              id=""
              class="px-2 mx-2"
              onclick="filter(value)"
            />English
            <input
              type="radio"
              value="Soft skills"
              name="filters"
              id=""
              class="px-2 mx-2"
              onclick="filter(value)"
            />
            Soft skills
          </div>
        </div>
        <div
          id="container"
          class="container-fluid p-0 mx-auto row d-flex flex-wrap align-items-center justify-content-center gap-2 my-2"
        ></div>
      </section>
    </body>
    <footer>
      <section
        id="contact"
        class="container p-0 border rounded my-2 bg-black bg-gradient border-secondary py-4"
      >
        <div class="container row justify-content-between">
          <div class="container d-flex flex-column col">
            <h3 class="text-white">Let's conect</h3>
            <p class="text-secondary">
              I'am always open to new oportunities and exciting proyects.
            </p>
          </div>
          <div
            class="col-7 d-flex flex-row justify-content-end align-items-center px-0"
          >
            <a
              href="mailto:jonathangalimberti@hotmail.com"
              class="btn btn-primary"
              ><img
                src="/public/img/mail.png"
                class="img-fluid me-2 toggle-icon"
                style="width: 30px"
              />jonathangalimberti@hotmail.com</a
            >
            <a
              href="https://www.linkedin.com/in/jonathan-galimberti-developer"
              class="btn btn-primary mx-3"
              target="_blank"
              ><img
                src="/public/img/linkdin.png"
                class="img-fluid me-2"
                style="width: 30px"
              />linkedIn</a
            >
            <a
              href="https://github.com/jonathangalimberti/"
              class="btn btn-primary"
              target="_blank"
              ><img
                src="/public/img/gthub.png"
                class="img-fluid me-2 toggle-icon"
                style="width: 30px"
              />GitHub</a
            >
          </div>
        </div>
      </section>
    </footer>

    <script src="./certificates.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
